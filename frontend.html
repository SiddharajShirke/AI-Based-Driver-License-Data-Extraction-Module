<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver License Data Extractor</title>
    <style>
        body {
            background: #fff;
            color: #111;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #fff;
            border: 1px solid #111;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            font-weight: normal;
            margin-bottom: 24px;
        }

        input[type="file"] {
            display: block;
            margin: 0 auto 24px auto;
        }

        button {
            background: #111;
            color: #fff;
            border: none;
            padding: 10px 32px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            display: block;
            margin: 0 auto 24px auto;
        }

        button:active {
            background: #333;
        }

        .output {
            background: #f9f9f9;
            color: #111;
            border: 1px solid #111;
            border-radius: 4px;
            padding: 16px;
            white-space: pre-wrap;
            font-size: 14px;
            min-height: 80px;
        }

        .loading {
            text-align: center;
            color: #888;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Driver License Data Extractor</h1>
        <input type="file" id="fileInput" accept="image/*">
        <button id="submitBtn">Enter</button>
        <div class="loading" id="loading" style="display:none;">Processing...</div>
        <div class="output" id="output"></div>
    </div>
    <script>
        const fileInput = document.getElementById('fileInput');
        const submitBtn = document.getElementById('submitBtn');
        const output = document.getElementById('output');
        const loading = document.getElementById('loading');

        submitBtn.onclick = async function () {
            const file = fileInput.files[0];
            if (!file) {
                output.textContent = 'Please select an image file.';
                return;
            }
            output.textContent = '';
            loading.style.display = 'block';
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetch('http://localhost:8000/documents/driver-license/parse', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                output.textContent = 'Error: ' + err;
            }
            loading.style.display = 'none';
        };
    </script>
</body>

</html>
